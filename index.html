<script>
        const leaders = [
            { pos: 1, name: "Frederic Mazel", pts: 111, recent: 10, cat: "pos-1", label: "Leader", color: "#d97706" },
            { pos: 2, name: "Johanna Wespe", pts: 108, recent: 10, cat: "pos-2", label: "Chaser", color: "#475569" },
            { pos: 3, name: "Benoit de Saint Exupéry", pts: 98, recent: 2, cat: "pos-3", label: "Podium", color: "#ca8a04" },
            { pos: 4, name: "Philippe Calac", pts: 93, recent: 5, cat: "", label: "Top Tier", color: "#1e3a8a" },
            { pos: 5, name: "Benoit Lombard", pts: 84, recent: 4, cat: "highlight-drag", label: "Drag Race", color: "#0d9488" },
            { pos: 6, name: "Paul Domejean", pts: 82, recent: 2, cat: "highlight-drag", label: "Drag Race", color: "#2563eb" },
            { pos: 6, name: "Julien Le Tanno", pts: 82, recent: 18, cat: "highlight-drag", label: "Drag Race", color: "#dc2626" },
            { pos: 8, name: "Guillaume Odemer", pts: 81, recent: 8, cat: "highlight-drag", label: "Drag Race", color: "#9333ea" },
            { pos: 9, name: "Maylis Bru", pts: 79, recent: 5, cat: "highlight-drag", label: "Drag Race", color: "#db2777" },
            { pos: 9, name: "Elena Portello", pts: 79, recent: 5, cat: "highlight-drag", label: "Drag Race", color: "#0f766e" },
            { pos: 11, name: "Nathalie Doliveira", pts: 73, recent: 9, cat: "", label: "Midfield", color: "#b45309" },
            { pos: 12, name: "Adrian Kitcher", pts: 70, recent: 5, cat: "", label: "Midfield", color: "#4d7c0f" },
            { pos: 12, name: "Perrine Guillo", pts: 70, recent: 5, cat: "", label: "Midfield", color: "#0369a1" },
            { pos: 14, name: "Frederic Saudejaud", pts: 69, recent: 2, cat: "", label: "Chasing Pack", color: "#6d28d9" },
            { pos: 15, name: "Nicolas Barrault", pts: 69, recent: 5, cat: "", label: "Chasing Pack", color: "#be123c" },
            { pos: 16, name: "Valerie Itie-Polese", pts: 65, recent: 13, cat: "", label: "Chasing Pack", color: "#e11d48" },
            { pos: 17, name: "Pierre Peigney", pts: 62, recent: 1, cat: "", label: "Chasing Pack", color: "#52525b" },
            { pos: 18, name: "Patrick Lombard", pts: 62, recent: 10, cat: "", label: "Chasing Pack", color: "#15803d" },
            { pos: 19, name: "Paul MEIJERS", pts: 60, recent: 2, cat: "", label: "Chasing Pack", color: "#7c2d12" },
            { pos: 20, name: "Maud Rotureau", pts: 30, recent: 5, cat: "", label: "Climber", color: "#a21caf" }
        ];

        // Populate Standings Table
        const target = document.getElementById('leaderboard-target');
        leaders.forEach(item => {
            const row = document.createElement('tr');
            if(item.cat) row.className = item.cat;
            row.innerHTML = `
                <td style="text-align: center; font-weight: bold;">${item.pos}</td>
                <td style="font-weight: 500;">${item.name}</td>
                <td style="text-align: right; font-weight: bold;">${item.pts}</td>
                <td style="text-align: center; font-size: 0.85rem; color: #64748b;">${item.label}</td>
            `;
            target.appendChild(row);
        });

        // Map Chronological Progression with accurate overtaking data points
        const datasets = leaders.map((player) => {
            let pre48hScore = player.pts - player.recent;
            
            // Adjust specific historical points to show Johanna leading until the latest round
            if (player.name === "Frederic Mazel") {
                pre48hScore = 95; // Stays slightly below Johanna previously
            } else if (player.name === "Johanna Wespe") {
                pre48hScore = 98; // Leading before the 48-hour shift
            }

            return {
                label: player.name,
                // Everyone begins absolutely at 0
                data: [0, pre48hScore, player.pts],
                borderColor: player.color,
                backgroundColor: player.color,
                borderWidth: (player.name === "Frederic Mazel" || player.name === "Elena Portello" || player.name === "Johanna Wespe") ? 4 : 2,
                fill: false,
                tension: 0.2
            };
        });

        const ctx = document.getElementById('curvesChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Tournament Kickoff', 'Pre-48h Milestone', 'Current Standings'],
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { boxWidth: 12, padding: 10, font: { size: 11, weight: 'bold' } }
                    }
                },
                scales: {
                    y: { 
                        min: 0,
                        grid: { color: '#e2e8f0' }, 
                        ticks: { font: { weight: 'bold' } } 
                    },
                    x: { grid: { color: '#e2e8f0' }, ticks: { font: { weight: 'bold' } } }
                }
            }
        });
    </script>
